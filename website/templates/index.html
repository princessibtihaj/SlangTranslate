<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">Recipe Generator</h2>
            <p class="text-center">Enter a dish or ingredients and get a recipe.</p>
            <p class="text-center">Example: pancakes, chicken curry, or healthy pasta dinner.</p>
            <div class="mb-3">
                <textarea class="form-control" id="inputText" rows="4" placeholder="pancakes"></textarea>
            </div>
            <div class="d-grid gap-2 mb-3">
                <button class="btn btn-primary" onclick="generateRecipe()">Generate Recipe</button>
            </div>
            <div class="border p-3 bg-white" id="outputText">
                Recipe output will appear here.
            </div>
        </div>
    </div>

    <script>
        function generateRecipe() {
            let input = document.getElementById("inputText").value;
            let output = document.getElementById("outputText");
            if (input.trim() === "") {
                output.innerText = "Please enter a dish name or recipe request.";
                return;
            }
            // use fetch to send the input text to the server
            fetch("/recipe", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    input: input
                })
            })
            .then(response => response.json())

            // update the output text with the generated recipe
            .then(data => {
                output.innerText = data.recipeText;
            })
            .catch(error => {
                output.innerText = "An error occurred. Please try again.";
            });
        }
    </script>
</body>
</html>
